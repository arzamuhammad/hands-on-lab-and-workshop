footer: "Intro to Data Platforms | Politeknik Gajah Tunggal"
slides:
  - type: cover
    title: "FROM ZERO TO DATA"
    subtitle: "Understanding Data, Databases & the World of Data Careers"
    author: "Guest Lecture | Politeknik Gajah Tunggal"

  - type: agenda
    title: "TODAY'S JOURNEY"
    items:
      - "What is data & a database?"
      - "Two worlds: OLTP vs OLAP"
      - "Then vs Now: on-premise to cloud"
      - "Careers in data analytics"
      - "Meet SQL + hands-on lab"

  - type: content
    title: "Data Is Everywhere Around You"
    bullets:
      - "Every chat, like, and video you watch creates data"
      - "Ride-hailing, e-wallets, and online shops run entirely on data"
      - "Today you'll learn how that data is stored, analyzed, and turned into decisions"

  - type: section
    title: "PART 1 — UNDERSTANDING DATABASES"

  - type: content
    title: "From Data to Decisions"
    bullets:
      - "Data = raw facts (numbers, names, dates)"
      - "Information = data organized to have meaning"
      - "Decision = action taken from that information"
      - "Databases are where this journey begins"

  - type: content
    title: "What Is a Database?"
    bullets:
      - "A giant, super-organized digital filing cabinet"
      - "Stores data so it can be found in an instant"
      - "Even the contacts app on your phone is a mini-database"

  - type: two_column
    title: "Why Every Enterprise Needs One"
    columns:
      - title: "Without a database"
        bullets:
          - "Data scattered in files & spreadsheets"
          - "Slow, error-prone, hard to trust"
          - "No single source of truth"
      - title: "Real-world examples"
        bullets:
          - "Banks: every transaction recorded safely"
          - "E-commerce: products, orders, payments"
          - "Hospitals: patient records on demand"

  - type: section
    title: "PART 2 — OLTP vs OLAP"

  - type: content
    title: "Two Worlds of Data"
    bullets:
      - "Some systems are built to RECORD what happens (transactions)"
      - "Others are built to ANALYZE what happened (insights)"
      - "Let's use one retail store to see both"

  - type: two_column
    title: "OLTP vs OLAP"
    columns:
      - title: "OLTP — Transactions"
        bullets:
          - "Example: you checkout & pay"
          - "Fast, one record at a time"
          - "Many users, real-time, write-heavy"
          - "Always the latest data"
      - title: "OLAP — Analytics"
        bullets:
          - "Example: 'top products last 3 months?'"
          - "Reads millions of rows, summarizes"
          - "Few analysts, read-heavy"
          - "Historical data over time"

  - type: content
    title: "Why It Matters"
    bullets:
      - "OLTP keeps the business running every second"
      - "OLAP helps the business decide what to do next"
      - "The world of data analytics lives in OLAP — your future playground"

  - type: two_column
    title: "QUIZ 1 — Databases & OLTP vs OLAP"
    columns:
      - title: "Q1. A database is best described as:"
        bullets:
          - "A. A type of website"
          - "B. A super-organized digital filing cabinet"
          - "C. A programming language"
          - "D. A social media app"
      - title: "Q2. Tapping 'Pay' at checkout is an example of:"
        bullets:
          - "A. OLAP"
          - "B. A data lake"
          - "C. OLTP"
          - "D. A dashboard"

  - type: section
    title: "PART 3 — THEN vs NOW"

  - type: two_column
    title: "The Old Way: On-Premise"
    columns:
      - title: "How it worked"
        bullets:
          - "Buy your own servers & storage"
          - "Keep them in a special cooled room"
          - "A team maintains the hardware 24/7"
      - title: "The pain"
        bullets:
          - "Huge upfront cost (CAPEX)"
          - "Capacity guessed years ahead"
          - "Storage & compute locked together"
          - "Scaling up takes months"

  - type: content
    title: "Analogy: Owning a Private Generator"
    bullets:
      - "Expensive to buy and maintain"
      - "Fixed capacity — too big or too small"
      - "You handle every breakdown yourself"

  - type: two_column
    title: "The New Way: Cloud"
    columns:
      - title: "What changed"
        bullets:
          - "Use a data platform over the internet"
          - "No hardware to buy or maintain"
          - "Spin resources up and down instantly"
      - title: "Why it's better"
        bullets:
          - "Pay only for what you use (OPEX)"
          - "Elastic — scale in seconds"
          - "Small teams focus on data, not servers"

  - type: content
    title: "The Big Idea: Storage Separates from Compute"
    bullets:
      - "Storage (the data) and compute (the engine) scale independently"
      - "Need more power? Add compute without touching storage"
      - "This is the core advantage of the modern cloud era"

  - type: content
    title: "Analogy: Plugging into the Power Grid"
    bullets:
      - "No private generator needed"
      - "Electricity on demand, billed by usage"
      - "That's how modern cloud data platforms work"

  - type: content
    title: "Modern Terms You'll Hear"
    bullets:
      - "Data Warehouse: structured data for analytics"
      - "Data Lake: raw data of any type, stored cheaply"
      - "Lakehouse: best of both in one platform"

  - type: section
    title: "PART 4 — CAREERS IN DATA"

  - type: stat
    title: "A Field Full of Opportunity"
    stats:
      - {number: "Top 5", label: "Most in-demand tech jobs globally"}
      - {number: "High", label: "Salary potential, even entry-level"}
      - {number: "Every", label: "Industry needs data talent"}

  - type: content
    title: "Analogy: The Data Restaurant Team"
    bullets:
      - "It takes a whole team to run a great restaurant"
      - "Each data role is like a member of that team"
      - "Let's meet them one by one"

  - type: three_column
    title: "Meet the Team (1 of 2)"
    columns:
      - title: "Data Analyst"
        bullets:
          - "Reads sales reports"
          - "Gives insights to managers"
          - "Tools: SQL, BI dashboards"
      - title: "Data Scientist"
        bullets:
          - "Predicts what sells next"
          - "Builds ML models"
          - "Tools: Python, statistics"
      - title: "Data Engineer"
        bullets:
          - "Builds data pipelines"
          - "Supplies clean data"
          - "Tools: SQL, pipelines"

  - type: three_column
    title: "Meet the Team (2 of 2)"
    columns:
      - title: "Data Architect"
        bullets:
          - "Designs the blueprint"
          - "Plans how data flows"
          - "Big-picture thinker"
      - title: "Data Governance"
        bullets:
          - "Keeps data safe & compliant"
          - "Ensures quality & rules"
          - "Guardian of trust"
      - title: "Data Admin (DBA)"
        bullets:
          - "Keeps the 'warehouse' running"
          - "Fast, secure, available"
          - "Operations specialist"

  - type: two_column
    title: "How Do I Start?"
    columns:
      - title: "Learn the basics"
        bullets:
          - "SQL — the language of data"
          - "Spreadsheets — quick analysis"
          - "One visualization tool"
      - title: "Then grow"
        bullets:
          - "Practice on real datasets"
          - "Build small projects"
          - "Today's lab is your first step!"

  - type: two_column
    title: "QUIZ 2 — Cloud & Data Careers"
    columns:
      - title: "Q1. A key advantage of cloud over on-premise:"
        bullets:
          - "A. You must buy servers upfront"
          - "B. Storage and compute scale independently"
          - "C. Capacity is fixed forever"
          - "D. Scaling takes months"
      - title: "Q2. Who builds pipelines so data flows cleanly?"
        bullets:
          - "A. Data Analyst"
          - "B. Data Scientist"
          - "C. Data Engineer"
          - "D. Data Architect"

  - type: section
    title: "PART 5 — MEET SQL"

  - type: content
    title: "SQL: How We Ask Questions to Data"
    bullets:
      - "SQL = Structured Query Language"
      - "It reads almost like simple English"
      - "You describe WHAT you want, the database finds it"

  - type: content
    title: "A Simple 'Wow' Example"
    bullets:
      - "SELECT name FROM students WHERE major = 'IT';"
      - "Instantly returns every IT student — from thousands of rows"
      - "In the lab, you'll write queries just like this"

  - type: two_column
    title: "QUIZ 3 — Meet SQL"
    columns:
      - title: "Q1. What does SQL let you do?"
        bullets:
          - "A. Edit videos"
          - "B. Ask questions to a database"
          - "C. Design logos"
          - "D. Send emails"
      - title: "Q2. Which keyword retrieves data?"
        bullets:
          - "A. DELETE"
          - "B. UPDATE"
          - "C. SELECT"
          - "D. INSERT"

  - type: quote
    text: "Today you will become an analyst, a data engineer, and a dashboard builder."
    author: "Your next 2 hours"

  - type: thankyou
    title: "LET'S BUILD!"
    subtitle: "Time for the hands-on lab"
    contact: "Politeknik Gajah Tunggal"
